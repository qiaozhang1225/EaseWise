<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EaseWise API Tester</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f5f7fb; color: #1f2937; }
    .wrap { max-width: 1080px; margin: 0 auto; padding: 24px; }
    .card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08); margin-bottom: 16px; }
    .almanac-grid { display: grid; grid-template-columns: 1.2fr 1fr 1fr; gap: 14px; }
    .badge { display: inline-block; padding: 6px 10px; margin: 4px 6px 0 0; border-radius: 999px; font-size: 13px; }
    .badge-good { background: #ecfdf5; color: #047857; }
    .badge-bad { background: #fef2f2; color: #b91c1c; }
    .badge-neutral { background: #eff6ff; color: #1d4ed8; }
    h1, h2, h3 { margin-top: 0; }
    form { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; align-items: end; }
    label { display: flex; flex-direction: column; gap: 6px; font-size: 14px; }
    input, select, button, textarea { padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; }
    button { background: #2563eb; color: #fff; border: none; cursor: pointer; }
    button:hover { background: #1d4ed8; }
    pre { white-space: pre-wrap; word-break: break-word; background: #0f172a; color: #e2e8f0; padding: 16px; border-radius: 10px; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px 8px; border-bottom: 1px solid #e5e7eb; text-align: left; font-size: 14px; }
    .hint { color: #6b7280; font-size: 13px; }
    .meta { color: #4b5563; line-height: 1.7; font-size: 14px; }
    @media (max-width: 900px) {
      .almanac-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>易如反掌网页测试台</h1>
      <p class="hint">当前测试模式为单机版：FastAPI + SQLite。下面这张卡片就是小程序首页黄历功能的后端返回效果。</p>
    </div>

    <div class="card">
      <h2>今日黄历</h2>
      <div class="almanac-grid">
        <div>
          <h3 id="almanac-date">加载中...</h3>
          <div class="meta" id="almanac-lunar"></div>
          <div class="meta" id="almanac-ganzhi"></div>
          <div class="meta" id="almanac-meta"></div>
        </div>
        <div>
          <h3>宜</h3>
          <div id="almanac-yi"></div>
        </div>
        <div>
          <h3>忌</h3>
          <div id="almanac-ji"></div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>手机号测试</h2>
      <form id="review-form">
        <label>
          手机号
          <input id="phone" name="phone" type="text" maxlength="32" placeholder="请输入 11 位手机号" value="18911896619" required>
        </label>
        <label>
          性别
          <select id="gender" name="gender">
            <option value="male">male</option>
            <option value="female">female</option>
          </select>
        </label>
        <label>
          附带 Markdown
          <select id="include_markdown" name="include_markdown">
            <option value="true">true</option>
            <option value="false">false</option>
          </select>
        </label>
        <button type="submit">生成测试结果</button>
      </form>
    </div>

    <div class="card">
      <h2>最新结果</h2>
      <pre id="result">点击“生成测试结果”后，这里会展示返回 JSON。</pre>
    </div>

    <div class="card">
      <h2>最近请求</h2>
      <button id="refresh" type="button">刷新列表</button>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>手机号</th>
            <th>性别</th>
            <th>状态</th>
            <th>创建时间</th>
          </tr>
        </thead>
        <tbody id="history-body"></tbody>
      </table>
    </div>
  </div>

  <script>
    const form = document.getElementById('review-form');
    const resultNode = document.getElementById('result');
    const historyBody = document.getElementById('history-body');
    const refreshButton = document.getElementById('refresh');

    function renderBadges(node, items, kind) {
      node.innerHTML = '';
      for (const item of items) {
        const badge = document.createElement('span');
        badge.className = `badge ${kind}`;
        badge.textContent = item;
        node.appendChild(badge);
      }
    }

    async function loadAlmanac() {
      const response = await fetch('/api/v1/almanac/today');
      const data = await response.json();
      document.getElementById('almanac-date').textContent = data.display_date;
      document.getElementById('almanac-lunar').textContent = `农历：${data.lunar_date}`;
      document.getElementById('almanac-ganzhi').textContent = `干支：${data.ganzhi_year}年 ${data.ganzhi_month}月 ${data.ganzhi_day}日`;
      const festivals = data.festivals.length ? `，节日：${data.festivals.join('、')}` : '';
      const solarTerm = data.solar_term ? `，节气：${data.solar_term}` : '';
      document.getElementById('almanac-meta').textContent = `值星：${data.zhi_xing}，冲：${data.chong}，煞：${data.sha}${solarTerm}${festivals}`;
      renderBadges(document.getElementById('almanac-yi'), data.yi, 'badge-good');
      renderBadges(document.getElementById('almanac-ji'), data.ji, 'badge-bad');
    }

    async function loadHistory() {
      const response = await fetch('/api/v1/reviews?limit=10');
      const payload = await response.json();
      historyBody.innerHTML = '';
      for (const item of payload.items) {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td><code>${item.id.slice(0, 8)}</code></td>
          <td>${item.masked_phone}</td>
          <td>${item.gender}</td>
          <td>${item.status}</td>
          <td>${item.created_at}</td>
        `;
        historyBody.appendChild(row);
      }
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      resultNode.textContent = '处理中，请稍候...';
      const payload = {
        phone: document.getElementById('phone').value,
        gender: document.getElementById('gender').value,
        include_markdown: document.getElementById('include_markdown').value === 'true',
      };
      const response = await fetch('/api/v1/reviews', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const data = await response.json();
      resultNode.textContent = JSON.stringify(data, null, 2);
      await loadHistory();
    });

    refreshButton.addEventListener('click', loadHistory);
    loadAlmanac();
    loadHistory();
  </script>
</body>
</html>
